# Haupt-Konfiguration für Guition JC3248W535 Display
substitutions:
  device_name: guition-display
  friendly_name: Guition Display
  home_page: meine_lampen  # Startseite

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}

# Hardware: ESP32-S3 + 3.5" Touch Display
packages:
  device: !include devices/JC3248W535.yaml
  common: !include common.yaml
  layout: !include layouts/480x320.yaml
  
  # Feature-Pages
  lampen: !include meine-lampen.yaml
  wetter: !include wetter.yaml
  temperaturen: !include temperaturen.yaml
  heizung: !include heizung.yaml

# WiFi (aus secrets.yaml)
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  
  # Fallback Access Point
  ap:
    ssid: "Guition Fallback"
    password: "12345678"

# Home Assistant API
api:
  encryption:
    key: !secret api_encryption_key

# OTA Updates
ota:
  - platform: esphome
    password: !secret ota_password
