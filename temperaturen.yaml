packages:
  temperaturen_sensors:
    sensor:
      # Ersetze entity_id mit deinen sensor.snf_xxx_temperature
      - platform: homeassistant
        id: snf_temp_1
        entity_id: sensor.snf_wohnzimmer_temperature  # Beispiel
        on_value:
          - lvgl.label.update:
              id: temp_sensor_1
              text: !lambda |-
                char buf[16];
                sprintf(buf, "%.1f°C", x);
                return buf;
      
      - platform: homeassistant
        id: snf_temp_2
        entity_id: sensor.snf_kueche_temperature  # Beispiel
        on_value:
          - lvgl.label.update:
              id: temp_sensor_2
              text: !lambda |-
                char buf[16];
                sprintf(buf, "%.1f°C", x);
                return buf;
      
      # Füge weitere Sensoren hinzu (snf_temp_3 bis snf_temp_6)
      # Suche in esphome_entities.json nach allen sensor.snf_*_temperature
