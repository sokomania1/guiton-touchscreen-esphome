# Hardware-Config fuer Guition JC3248W535 (ESP32-S3 + 3.5" Touch Display)
esphome:
  platformio_options:
    upload_speed: 921600
    board_build.flash_mode: qio
    board_build.f_flash: 80000000L
    board_build.f_cpu: 240000000L

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf
    version: recommended
    sdkconfig_options:
      COMPILER_OPTIMIZATION_SIZE: y
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: y
      CONFIG_ESP32S3_DATA_CACHE_64KB: y
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: y
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: y
      CONFIG_SPIRAM_RODATA: y
      CONFIG_ESP32S3_SPIRAM_SUPPORT: y
      CONFIG_SPIRAM_USE_MALLOC: y

psram:
  mode: octal
  speed: 80MHz

spi:
  - id: quad_spi
    type: quad
    clk_pin: 47
    data_pins: [21, 48, 40, 39]

i2c:
  - id: i2c_bus
    sda: 4
    scl: 8
    frequency: 400kHz

# Backlight PWM Control
output:
  - id: gpio_backlight_pwm
    platform: ledc
    pin: 1
    frequency: 1000Hz

light:
  - id: backlight
    name: Backlight
    platform: monochromatic
    output: gpio_backlight_pwm
    restore_mode: ALWAYS_ON

# Display (480x320 MIPI SPI)
display:
  - id: main_display
    platform: mipi_spi
    model: JC3248W535
    spi_id: quad_spi
    data_rate: 40MHz
    update_interval: never
    auto_clear_enabled: false

# Touchscreen (AXS15231)
# TOUCH_RST = -1 (kein Reset-Pin laut Schaltplan)
# TOUCH_INT = GPIO3 (Strapping-Pin, daher nicht als interrupt_pin verwenden)
touchscreen:
  - id: main_touchscreen
    platform: axs15231
    i2c_id: i2c_bus
