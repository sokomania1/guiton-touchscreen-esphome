# Wetter-Seite (weather.freudenstadt)
lvgl:
  pages:
    - id: wetter
      bg_color: 0x001F3F  # Dunkelblau
      on_load:
        - lvgl.label.update:
            id: page_title
            text: Wetter
      widgets:
        - obj:
            bg_color: 0x001F3F
            border_width: 0
            pad_all: 10
            pad_top: 60
            pad_bottom: 60
            width: 100%
            height: 100%
            layout:
              type: FLEX
              flex_flow: COLUMN
              flex_align_main: CENTER
              pad_row: 10
            widgets:
              # Icon + Zustand
              - label:
                  id: wetter_icon
                  text: "Sunny"
                  text_font: roboto_xxl
                  text_color: 0xFFD700
                  align: CENTER

              - label:
                  id: wetter_condition
                  text: "Sonnig"
                  text_font: roboto_xl
                  text_color: 0xFFFFFF
                  align: CENTER

              # Temperatur (groß)
              - label:
                  id: wetter_temp
                  text: "15\u00b0C"
                  text_font: roboto_xxl
                  text_color: 0x00FF00
                  align: CENTER

              # Weitere Infos
              - obj:
                  width: 100%
                  bg_color: 0x001F3F
                  border_width: 0
                  layout:
                    type: FLEX
                    flex_flow: ROW
                    flex_align_main: SPACE_AROUND
                  widgets:
                    - label:
                        id: wetter_humidity
                        text: "Hum: 65%"
                        text_color: 0xADD8E6
                    - label:
                        id: wetter_pressure
                        text: "1013 hPa"
                        text_color: 0xADD8E6

sensor:
  - platform: homeassistant
    id: wetter_temp_sensor
    entity_id: weather.freudenstadt
    attribute: temperature
    on_value:
      - lvgl.label.update:
          id: wetter_temp
          text: !lambda |-
            char buf[16];
            sprintf(buf, "%.1f\u00b0C", x);
            return buf;

  - platform: homeassistant
    id: wetter_humidity_sensor
    entity_id: weather.freudenstadt
    attribute: humidity
    on_value:
      - lvgl.label.update:
          id: wetter_humidity
          text: !lambda |-
            char buf[16];
            sprintf(buf, "Hum: %.0f%%", x);
            return buf;

  - platform: homeassistant
    id: wetter_pressure_sensor
    entity_id: weather.freudenstadt
    attribute: pressure
    on_value:
      - lvgl.label.update:
          id: wetter_pressure
          text: !lambda |-
            char buf[16];
            sprintf(buf, "%.0f hPa", x);
            return buf;

text_sensor:
  - platform: homeassistant
    id: wetter_condition_sensor
    entity_id: weather.freudenstadt
    on_value:
      - lvgl.label.update:
          id: wetter_condition
          text: !lambda |-
            std::map<std::string, std::string> conditions = {
              {"clear-night", "Klar"},
              {"cloudy", "Bewoelkt"},
              {"fog", "Nebel"},
              {"hail", "Hagel"},
              {"lightning", "Gewitter"},
              {"lightning-rainy", "Gewitter+Regen"},
              {"partlycloudy", "Teilw. bewoelkt"},
              {"pouring", "Starkregen"},
              {"rainy", "Regen"},
              {"snowy", "Schnee"},
              {"snowy-rainy", "Schneeregen"},
              {"sunny", "Sonnig"},
              {"windy", "Windig"},
              {"windy-variant", "Windig"},
              {"exceptional", "Ungewoehnlich"}
            };
            return conditions.count(x) ? conditions[x] : x;
      - lvgl.label.update:
          id: wetter_icon
          text: !lambda |-
            if (x == "sunny") return "Sunny";
            if (x == "clear-night") return "Clear";
            if (x == "cloudy") return "Cloudy";
            if (x == "rainy" || x == "pouring") return "Rain";
            if (x == "snowy" || x == "snowy-rainy") return "Snow";
            if (x == "fog") return "Fog";
            if (x == "lightning" || x == "lightning-rainy") return "Storm";
            return "Partly";
