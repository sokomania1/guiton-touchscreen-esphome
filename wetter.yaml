# Wetter-Seite (weather.freudenstadt)
lvgl:
  pages:
    - id: wetter
      bg_color: 0x001F3F  # Dunkelblau
      on_load:
        - lvgl.label.update:
            id: page_title
            text: Wetter
      widgets:
        - obj:
            bg_color: 0x001F3F
            border_width: 0
            pad_all: 20
            width: 100%
            height: 100%
            layout:
              type: FLEX
              flex_flow: COLUMN
              flex_align_main: CENTER
              pad_row: 20
            widgets:
              # Icon + Zustand
              - label:
                  id: wetter_icon
                  text: "☀️"
                  text_font: roboto_xxl
                  text_color: 0xFFD700
                  align: CENTER
              
              - label:
                  id: wetter_condition
                  text: "Sonnig"
                  text_font: roboto_xl
                  text_color: 0xFFFFFF
                  align: CENTER
              
              # Temperatur (groß)
              - label:
                  id: wetter_temp
                  text: "15°C"
                  text_font: roboto_xxl
                  text_color: 0x00FF00
                  align: CENTER
              
              # Weitere Infos
              - obj:
                  width: 100%
                  layout:
                    type: FLEX
                    flex_flow: ROW
                    flex_align_main: SPACE_AROUND
                  widgets:
                    - label:
                        id: wetter_humidity
                        text: "💧 65%"
                        text_color: 0xADD8E6
                    - label:
                        id: wetter_pressure
                        text: "🌪️ 1013 hPa"
                        text_color: 0xADD8E6

packages:
  wetter_sensors:
    text_sensor:
      - platform: homeassistant
        id: wetter_condition_sensor
        entity_id: weather.freudenstadt
        on_value:
          - lvgl.label.update:
              id: wetter_condition
              text: !lambda |-
                std::map<std::string, std::string> conditions = {
                  {"clear-night", "Klar"},
                  {"cloudy", "Bewölkt"},
                  {"fog", "Nebel"},
                  {"hail", "Hagel"},
                  {"lightning", "Gewitter"},
                  {"lightning-rainy", "Gewitter+Regen"},
                  {"partlycloudy", "Teilweise bewölkt"},
                  {"pouring", "Starkregen"},
                  {"rainy", "Regen"},
                  {"snowy", "Schnee"},
                  {"snowy-rainy", "Schneeregen"},
                  {"sunny", "Sonnig"},
                  {"windy", "Windig"},
                  {"windy-variant", "Windig"},
                  {"exceptional", "Außergewöhnlich"}
                };
                return conditions.count(x) ? conditions[x] : x;
          - lvgl.label.update:
              id: wetter_icon
              text: !lambda |-
                if (x == "sunny") return "☀️";
                if (x == "cloudy") return "☁️";
                if (x == "rainy") return "🌧️";
                if (x == "snowy") return "❄️";
                return "🌤️";
    
    sensor:
      - platform: homeassistant
        id: wetter_temp_sensor
        entity_id: weather.freudenstadt
        attribute: temperature
        on_value:
          - lvgl.label.update:
              id: wetter_temp
              text: !lambda |-
                char buf[16];
                sprintf(buf, "%.1f°C", x);
                return buf;
      
      - platform: homeassistant
        id: wetter_humidity_sensor
        entity_id: weather.freudenstadt
        attribute: humidity
        on_value:
          - lvgl.label.update:
              id: wetter_humidity
              text: !lambda |-
                char buf[16];
                sprintf(buf, "💧 %.0f%%", x);
                return buf;
      
      - platform: homeassistant
        id: wetter_pressure_sensor
        entity_id: weather.freudenstadt
        attribute: pressure
        on_value:
          - lvgl.label.update:
              id: wetter_pressure
              text: !lambda |-
                char buf[16];
                sprintf(buf, "🌪️ %.0f hPa", x);
                return buf;
