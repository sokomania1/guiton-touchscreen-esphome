# Heizungs-Seite (climate.sonoff1, climate.sonoff2, climate.sonoff3)
lvgl:
  pages:
    - id: heizung
      bg_color: 0x2C0000  # Dunkelrot
      on_load:
        - lvgl.label.update:
            id: page_title
            text: Heizung
      widgets:
        - obj:
            bg_color: 0x2C0000
            border_width: 0
            pad_all: 10
            width: 100%
            height: 100%
            layout:
              type: FLEX
              flex_flow: ROW
              flex_align_main: SPACE_AROUND
              pad_column: 8
            widgets:
              # Sonoff 1
              - obj:
                  width: 31%
                  height: 100%
                  bg_color: 0x3C1414
                  border_color: 0xFF8C00
                  border_width: 2
                  radius: 8
                  pad_all: 10
                  layout:
                    type: FLEX
                    flex_flow: COLUMN
                    flex_align_main: SPACE_AROUND
                  widgets:
                    - label:
                        text: "🔥 Sonoff 1"
                        text_font: roboto_md
                        text_color: 0xFFFFFF
                    - label:
                        id: heizung1_temp
                        text: "20.0°C"
                        text_font: roboto_xl
                        text_color: 0xFF8C00
                    - label:
                        id: heizung1_target
                        text: "Soll: 22°C"
                        text_color: 0xCCCCCC
                    - label:
                        id: heizung1_mode
                        text: "Auto"
                        text_color: 0x00FF00
                    - button:
                        width: 100%
                        height: 40
                        bg_color: 0xFF8C00
                        widgets:
                          - label:
                              text: "Modus"
                              align: CENTER
                        on_short_click:
                          - homeassistant.action:
                              action: climate.set_hvac_mode
                              data:
                                entity_id: climate.sonoff1
                                hvac_mode: heat
              
              # Sonoff 2
              - obj:
                  width: 31%
                  height: 100%
                  bg_color: 0x3C1414
                  border_color: 0xFF8C00
                  border_width: 2
                  radius: 8
                  pad_all: 10
                  layout:
                    type: FLEX
                    flex_flow: COLUMN
                    flex_align_main: SPACE_AROUND
                  widgets:
                    - label:
                        text: "🔥 Sonoff 2"
                        text_font: roboto_md
                        text_color: 0xFFFFFF
                    - label:
                        id: heizung2_temp
                        text: "20.0°C"
                        text_font: roboto_xl
                        text_color: 0xFF8C00
                    - label:
                        id: heizung2_target
                        text: "Soll: 22°C"
                        text_color: 0xCCCCCC
                    - label:
                        id: heizung2_mode
                        text: "Auto"
                        text_color: 0x00FF00
                    - button:
                        width: 100%
                        height: 40
                        bg_color: 0xFF8C00
                        widgets:
                          - label:
                              text: "Modus"
                              align: CENTER
                        on_short_click:
                          - homeassistant.action:
                              action: climate.set_hvac_mode
                              data:
                                entity_id: climate.sonoff2
                                hvac_mode: heat
              
              # Sonoff 3
              - obj:
                  width: 31%
                  height: 100%
                  bg_color: 0x3C1414
                  border_color: 0xFF8C00
                  border_width: 2
                  radius: 8
                  pad_all: 10
                  layout:
                    type: FLEX
                    flex_flow: COLUMN
                    flex_align_main: SPACE_AROUND
                  widgets:
                    - label:
                        text: "🔥 Sonoff 3"
                        text_font: roboto_md
                        text_color: 0xFFFFFF
                    - label:
                        id: heizung3_temp
                        text: "20.0°C"
                        text_font: roboto_xl
                        text_color: 0xFF8C00
                    - label:
                        id: heizung3_target
                        text: "Soll: 22°C"
                        text_color: 0xCCCCCC
                    - label:
                        id: heizung3_mode
                        text: "Auto"
                        text_color: 0x00FF00
                    - button:
                        width: 100%
                        height: 40
                        bg_color: 0xFF8C00
                        widgets:
                          - label:
                              text: "Modus"
                              align: CENTER
                        on_short_click:
                          - homeassistant.action:
                              action: climate.set_hvac_mode
                              data:
                                entity_id: climate.sonoff3
                                hvac_mode: heat

packages:
  heizung_sensors:
    sensor:
      # Sonoff 1
      - platform: homeassistant
        id: heizung1_current_temp
        entity_id: climate.sonoff1
        attribute: current_temperature
        on_value:
          - lvgl.label.update:
              id: heizung1_temp
              text: !lambda |-
                char buf[16];
                sprintf(buf, "%.1f°C", x);
                return buf;
      
      - platform: homeassistant
        id: heizung1_target_temp
        entity_id: climate.sonoff1
        attribute: temperature
        on_value:
          - lvgl.label.update:
              id: heizung1_target
              text: !lambda |-
                char buf[16];
                sprintf(buf, "Soll: %.0f°C", x);
                return buf;
      
      # Sonoff 2
      - platform: homeassistant
        id: heizung2_current_temp
        entity_id: climate.sonoff2
        attribute: current_temperature
        on_value:
          - lvgl.label.update:
              id: heizung2_temp
              text: !lambda |-
                char buf[16];
                sprintf(buf, "%.1f°C", x);
                return buf;
      
      - platform: homeassistant
        id: heizung2_target_temp
        entity_id: climate.sonoff2
        attribute: temperature
        on_value:
          - lvgl.label.update:
              id: heizung2_target
              text: !lambda |-
                char buf[16];
                sprintf(buf, "Soll: %.0f°C", x);
                return buf;
      
      # Sonoff 3
      - platform: homeassistant
        id: heizung3_current_temp
        entity_id: climate.sonoff3
        attribute: current_temperature
        on_value:
          - lvgl.label.update:
              id: heizung3_temp
              text: !lambda |-
                char buf[16];
                sprintf(buf, "%.1f°C", x);
                return buf;
      
      - platform: homeassistant
        id: heizung3_target_temp
        entity_id: climate.sonoff3
        attribute: temperature
        on_value:
          - lvgl.label.update:
              id: heizung3_target
              text: !lambda |-
                char buf[16];
                sprintf(buf, "Soll: %.0f°C", x);
                return buf;
    
    text_sensor:
      # HVAC Mode (Auto/Heat/Off)
      - platform: homeassistant
        id: heizung1_hvac_mode
        entity_id: climate.sonoff1
        on_value:
          - lvgl.label.update:
              id: heizung1_mode
              text: !lambda |-
                return x.c_str();
      
      - platform: homeassistant
        id: heizung2_hvac_mode
        entity_id: climate.sonoff2
        on_value:
          - lvgl.label.update:
              id: heizung2_mode
              text: !lambda |-
                return x.c_str();
      
      - platform: homeassistant
        id: heizung3_hvac_mode
        entity_id: climate.sonoff3
        on_value:
          - lvgl.label.update:
              id: heizung3_mode
              text: !lambda |-
                return x.c_str();
